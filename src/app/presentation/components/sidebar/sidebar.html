<aside class="w-64 flex h-full flex-col 
                bg-violet-100/60 backdrop-blur-md
                border-r border-violet-300/30
                shadow-[4px_0_20px_rgba(124,58,237,0.1)]">

    
    <div class="p-4 shrink-0">
      <h2 class="text-xl text-center font-semibold text-gray-700">
        {{titleMenu}}
      </h2>
    </div>

    <div class="sidebar-scroll">

      @for (item of subModules(); track item.submoduleId) {

        <div class="mb-2">

          <button 
            (click)="toggle(item)"
            class="w-full flex items-center justify-between px-3 py-2 rounded-lg
                   text-gray-800 font-medium
                   hover:bg-violet-200/40 transition hover:cursor-pointer">

            <div class="flex items-center gap-2">
              <span class="text-gray-700">{{ item.submoduleName }}</span>
            </div>

            <i class="text-gray-700 fas"
              [class.fa-chevron-down]="!item.open"
              [class.fa-chevron-up]="item.open">
            </i> 
          </button>

          @if (item?.open) {
            <div class="ml-6 mt-2 flex flex-col gap-2">

              @for (sub of item.options; track sub.optionId) {
                <a (click)="goOption(sub.route)" 
                [ngClass]="[
           'pr-3 py-2 rounded-lg text-sm flex items-center gap-2 transition',
           'hover:bg-violet-200/40 cursor-pointer',
           isActive(sub.route) ? 'bg-violet-300/20 text-gray-700 font-semibold' : 'text-gray-700'
         ]">
                 
                 <i  [ngClass]="[sub.icon, 'text-xl']"></i> 
          
                  <p>{{ sub.optionName }}</p> 
                </a>
              }

            </div>
          }

        </div>

      }

    </div>

  </aside>
