<div class="flex flex-col min-h-screen">

<app-navbar/>

<div class="flex-1 flex items-center justify-center bg-violet-50 flex-col">

  <p class="text-3xl py-2 bold">Módulos</p>

  <div class="grid gap-6 w-[90%] max-w-5xl grid-cols-1 sm:grid-cols-2 md:grid-cols-3">

    @for (module of modules(); track module.moduleId) {
    <div  (click)="goModule(module.moduleName, module.moduleId, module.route)" class="bg-violet-200/40 backdrop-blur-sm rounded-2xl p-6 text-center 
             border border-violet-300/30
             shadow-[0_8px_20px_rgba(124,58,237,0.15)]
             hover:shadow-[0_12px_30px_rgba(124,58,237,0.25)]
             transition duration-300 hover:-translate-y-1
             hover:cursor-pointer
             ">

      <div class="flex justify-center items-center gap-3">

        <div class="w-16 h-16 flex items-center justify-center rounded-full
              bg-violet-200/50
              shadow-[inset_4px_4px_10px_rgba(124,58,237,0.25),inset_-4px_-4px_10px_rgba(255,255,255,0.8)]">
          <i [class]="module.icon" class="text-2xl text-violet-600"></i>
        </div>

        <p class="text-xl text-violet-700/80 mt-2 first-letter:uppercase">{{ module.moduleName }}</p>
      </div>
    </div>
    }
  </div>
</div>

</div>
